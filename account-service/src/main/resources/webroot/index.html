<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drone Delivery Service</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f4f4f4; padding: 20px; }
        .section { background: #fff; padding: 20px; border-radius: 8px; margin-bottom: 20px; }
        h2 { margin-top: 0; }
        label { display: inline-block; width: 150px; margin-bottom: 10px; }
        input { margin-bottom: 10px; }
        button { padding: 5px 15px; margin-top: 10px; cursor: pointer; }
        #log { background: #333; color: #0f0; padding: 10px; font-family: monospace; height: 200px; overflow-y: scroll; }
    </style>
</head>
<body>

    <h1>Drone Delivery Dashboard</h1>

    <!-- Authentication Section -->
    <div id="auth-section" class="section">
        <h2>Register / Login</h2>
        <label>Username:</label> <input type="text" id="username" value="user1"><br>
        <label>Password:</label> <input type="password" id="password" value="secret"><br>
        <button onclick="register()">1. Register</button>
        <button onclick="login()">2. Login</button>
        <p id="auth-status"></p>
    </div>

    <!-- Create Shipping Section -->
    <div id="shipping-section" class="section" style="display:none;">
        <h2>Create a Delivery</h2>
        <label>Pickup (X, Y):</label> 
        <input type="number" id="pickupX" value="0" style="width: 50px;">
        <input type="number" id="pickupY" value="0" style="width: 50px;"><br>
        
        <label>Delivery (X, Y):</label> 
        <input type="number" id="deliveryX" value="100" style="width: 50px;">
        <input type="number" id="deliveryY" value="100" style="width: 50px;"><br>
        
        <label>Weight (kg):</label> <input type="number" id="weight" value="5"><br>
        <label>Time Limit (ms):</label> <input type="number" id="timeLimit" value="60000"><br>
        <label>Delay (ms):</label> <input type="number" id="delay" value="0"><br>
        
        <button onclick="createShipping()">3. Schedule Delivery</button>
        <p id="shipping-status"></p>

        <h2>Tracking Log</h2>
        <div id="log"></div>
    </div>

    <script>
        const ACCOUNT_API = 'http://localhost:9000/api/v1/accounts';
        const DISPATCH_API = 'http://localhost:8081/api/v1/dispatch';
        
        let sessionId = null;
        let shippingId = null;
        let ws = null;

        function logEvent(msg) {
            const logDiv = document.getElementById('log');
            logDiv.innerHTML += `<div>${new Date().toISOString().split('T')[1]} - ${msg}</div>`;
            logDiv.scrollTop = logDiv.scrollHeight;
        }

        async function register() {
            const u = document.getElementById('username').value;
            const p = document.getElementById('password').value;
            try {
                const res = await fetch(ACCOUNT_API, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ userName: u, password: p })
                });
                const data = await res.json();
                document.getElementById('auth-status').innerText = 'Registered: ' + data.result;
            } catch (err) { alert(err); }
        }

        async function login() {
            const u = document.getElementById('username').value;
            const p = document.getElementById('password').value;
            try {
                const res = await fetch(`${DISPATCH_API}/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ userName: u, password: p })
                });
                const data = await res.json();
                if (data.sessionId) {
                    sessionId = data.sessionId;
                    document.getElementById('auth-status').innerText = 'Logged in! Session: ' + sessionId;
                    document.getElementById('shipping-section').style.display = 'block';
                } else {
                    document.getElementById('auth-status').innerText = 'Login Failed';
                }
            } catch (err) { alert(err); }
        }

        async function createShipping() {
            const payload = {
                pickupX: parseFloat(document.getElementById('pickupX').value),
                pickupY: parseFloat(document.getElementById('pickupY').value),
                deliveryX: parseFloat(document.getElementById('deliveryX').value),
                deliveryY: parseFloat(document.getElementById('deliveryY').value),
                weight: parseInt(document.getElementById('weight').value),
                timeLimit: parseInt(document.getElementById('timeLimit').value),
                timeBeforeScheduling: parseInt(document.getElementById('delay').value)
            };

            try {
                const res = await fetch(`${DISPATCH_API}/user-sessions/${sessionId}/shippings`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                const data = await res.json();
                        if (data.shippingId) {
                            shippingId = data.shippingId;
                            document.getElementById('shipping-status').innerText = 'Created Shipping ID: ' + shippingId;
                            // if server returned assigned drone URI, auto-connect for tracking
                            if (data.droneUri) {
                                const assigned = data.droneUri; // e.g. http://localhost:9001
                                const wsUrl = assigned.replace('http', 'ws') + '/api/v1/events';
                                if (ws) ws.close();
                                ws = new WebSocket(wsUrl);
                                ws.onopen = () => {
                                    logEvent('Connected to assigned drone: ' + wsUrl);
                                    ws.send(JSON.stringify({ shippingId: shippingId }));
                                    logEvent('Subscribed to events for: ' + shippingId);
                                };
                                ws.onmessage = (event) => {
                                    const ev = JSON.parse(event.data);
                                    if (ev.event === 'ShippingUpdate') {
                                        logEvent(`[UPDATE] Pos: (${ev.x.toFixed(1)}, ${ev.y.toFixed(1)}) | ETA: ${ev.timeLeft}`);
                                    } else {
                                        logEvent('Event: ' + JSON.stringify(ev));
                                    }
                                };
                                ws.onclose = () => logEvent('WS closed: ' + wsUrl);
                            }
                        } else {
                    document.getElementById('shipping-status').innerText = 'Failed: ' + (data.error || '');
                }
            } catch (err) { alert(err); }
        }
    </script>
</body>
</html>
